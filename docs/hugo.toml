baseURL = 'https://har-analyzer-94e0d.web.app/'
locale = 'en-us'
title = 'HAR Analyzer Docs'

# Enable Hextra theme via Hugo Modules
[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

# Enable raw HTML rendering for custom elements
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

